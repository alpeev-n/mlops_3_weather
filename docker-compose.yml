version: '3'

services:
  airflow:
    build: .
    container_name: airflow

    ports:
      - "8081:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./dataset:/opt/airflow/dataset

    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - API_KEY=${API_KEY}
    restart: always
